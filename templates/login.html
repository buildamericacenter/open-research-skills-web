{% extends "base.html" %}
{% block title %}Sign In{% endblock %}
{% block content %}
  <section class="auth-layout">
    <div class="auth-panel">
      <p class="eyebrow">Account</p>
      <h1>Sign In</h1>
      <p>Access your profile, submitted skills, and validation activity.</p>

      {% if error %}
        <div class="message error">{{ error }}</div>
      {% endif %}

      <form class="auth-form" method="post">
        <input type="hidden" name="next" value="{{ next_url }}">
        <label>
          <span>Email</span>
          <input type="email" name="email" value="{{ form.email }}" required autocomplete="email">
        </label>
        <label>
          <span>Password</span>
          <input type="password" name="password" required autocomplete="current-password">
        </label>
        <button type="submit">Sign In</button>
      </form>

      <p class="auth-switch">No account yet? <a href="{{ url_for('register') }}">Create one</a></p>
    </div>
  </section>
{% endblock %}
