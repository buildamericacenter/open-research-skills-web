{% extends "base.html" %}
{% block title %}Create Account{% endblock %}
{% block content %}
  <section class="auth-layout">
    <div class="auth-panel">
      <p class="eyebrow">Account</p>
      <h1>Create Account</h1>
      <p>Register to manage your profile and research skill contributions.</p>

      {% if error %}
        <div class="message error">{{ error }}</div>
      {% endif %}

      <form class="auth-form" method="post">
        <label>
          <span>Full Name</span>
          <input type="text" name="full_name" value="{{ form.full_name }}" required maxlength="45" autocomplete="name">
        </label>
        <label>
          <span>Email</span>
          <input type="email" name="email" value="{{ form.email }}" required maxlength="100" autocomplete="email">
        </label>
        <label>
          <span>Password</span>
          <input type="password" name="password" required minlength="8" autocomplete="new-password">
        </label>
        <label>
          <span>Confirm Password</span>
          <input type="password" name="confirm_password" required minlength="8" autocomplete="new-password">
        </label>
        <button type="submit">Create Account</button>
      </form>

      <p class="auth-switch">Already have an account? <a href="{{ url_for('login') }}">Sign in</a></p>
    </div>
  </section>
{% endblock %}
